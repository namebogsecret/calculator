<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Graphing Calculator</title>
    
    <!-- CSS Modules -->
    <link rel="stylesheet" href="src/styles/variables.css">
    <link rel="stylesheet" href="src/styles/base.css">
    <link rel="stylesheet" href="src/styles/calculator.css">
    <link rel="stylesheet" href="src/styles/buttons.css">
    <link rel="stylesheet" href="src/styles/display.css">
    <link rel="stylesheet" href="src/styles/modes.css">
    <link rel="stylesheet" href="src/styles/graphs.css">
    <link rel="stylesheet" href="src/styles/statistics.css">
    <link rel="stylesheet" href="src/styles/matrix.css">
    <link rel="stylesheet" href="src/styles/animations.css">
    <link rel="stylesheet" href="src/styles/effects.css">
    <link rel="stylesheet" href="src/styles/responsive.css">
</head>
<body>
    <div class="calculator-container" id="calculator">
        <!-- Mode Selector -->
        <div id="mode-selector-container"></div>
        
        <!-- Display Area -->
        <div id="display-container"></div>
        
        <!-- Calculator Content -->
        <div class="calculator-content">
            <!-- Graph Container -->
            <div id="graph-container"></div>
            
            <!-- Statistics Container -->
            <div id="statistics-container"></div>

            <!-- Matrix Container -->
            <div id="matrix-container"></div>

            <!-- Calculator Buttons -->
            <div id="buttons-container"></div>
        </div>
    </div>

    <!-- JavaScript Modules -->
    <script type="module">
        import { ComponentLoader } from './src/scripts/component-loader.js';
        import CalculatorApp from './src/scripts/app.js';
        import { effectsController } from './src/scripts/effects.js';
        import { initI18n, setLocale, t, applyTranslations } from './src/scripts/i18n.js';

        // Initialize the application
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Load all HTML components
                await ComponentLoader.initializeCalculatorComponents();

                // Initialize i18n system
                await initI18n();

                // Initialize the calculator application
                const calculatorApp = new CalculatorApp();
                await calculatorApp.init();
                
                // Make it globally accessible for debugging
                window.calculatorApp = calculatorApp;

                // Initialize effects system (sounds, confetti, themes, etc.)
                effectsController.init();
                window.effectsController = effectsController;

                // Make i18n functions globally accessible
                window.changeLanguage = async (locale) => {
                    await setLocale(locale);
                };
                window.t = t;
                window.applyTranslations = applyTranslations;
                
                // Expose global functions for HTML onclick handlers
                const calc = calculatorApp.getCalculator();
                const display = calculatorApp.getDisplayManager();

                window.appendToDisplay = (value) => {
                    const expr = calc.appendToExpression(value);
                    display.updateExpression(expr);
                    const preview = calc.previewCalculation();
                    if (preview !== null) {
                        display.updateResult(preview);
                    }
                };

                window.appendFunction = (func) => {
                    const expr = calc.appendFunction(func);
                    display.updateExpression(expr);
                    const preview = calc.previewCalculation();
                    if (preview !== null) {
                        display.updateResult(preview);
                    }
                };

                window.clearDisplay = () => {
                    calc.clear();
                    display.clear();
                };

                window.deleteLastChar = () => {
                    const expr = calc.deleteLastChar();
                    display.updateExpression(expr);
                    const preview = calc.previewCalculation();
                    if (preview !== null) {
                        display.updateResult(preview);
                    }
                };

                window.calculate = () => {
                    const result = calc.calculate();
                    if (result.success) {
                        display.updateResult(result.result, result.formattedResult);
                        // Trigger effects on successful calculation
                        effectsController.onCalculationComplete(result.formattedResult || result.result.toString(), true);
                    } else {
                        display.showError(result.error);
                        // Trigger error effects
                        effectsController.onCalculationComplete(null, false);
                    }
                };

                window.toggleAngleMode = () => {
                    const mode = calc.toggleAngleMode();
                    const btn = document.getElementById('angleMode');
                    if (btn) btn.textContent = mode.toUpperCase();
                };

                window.setMode = (mode) => {
                    calculatorApp.getModeManager().setMode(mode);
                };

                window.toggleFitScreen = () => {
                    const container = document.querySelector('.calculator-container');
                    const toggle = document.querySelector('.fit-screen-toggle');
                    if (container && toggle) {
                        container.classList.toggle('fit-screen');
                        toggle.classList.toggle('active');
                        // Save preference
                        localStorage.setItem('fitScreen', container.classList.contains('fit-screen'));
                    }
                };

                // Restore fit-screen preference
                if (localStorage.getItem('fitScreen') === 'true') {
                    const container = document.querySelector('.calculator-container');
                    const toggle = document.querySelector('.fit-screen-toggle');
                    if (container && toggle) {
                        container.classList.add('fit-screen');
                        toggle.classList.add('active');
                    }
                }

                // Graph functions
                const graph = calculatorApp.getGraphRenderer();

                window.plotGraph = () => {
                    const input = document.getElementById('functionInput');
                    if (graph && input && input.value) {
                        try {
                            graph.addFunction(input.value);
                        } catch (e) {
                            display.showError('Invalid function');
                        }
                    }
                };

                window.clearGraph = () => {
                    if (graph) {
                        graph.clearFunctions();
                    }
                };

                window.zoomIn = () => {
                    if (graph) graph.zoomIn();
                };

                window.zoomOut = () => {
                    if (graph) graph.zoomOut();
                };

                window.resetZoom = () => {
                    if (graph) graph.resetView();
                };

                window.switchGraphTab = (tab) => {
                    calculatorApp.tabManagers.graph.switchTab(tab);
                };

                // Statistics functions
                window.calculateStatistics = () => {
                    const input = document.getElementById('statsInput');
                    if (input && input.value) {
                        calculatorApp.handleStatisticsCalculation({ statsInput: input.value });
                    }
                };

                window.calculateRegression = () => {
                    const xInput = document.getElementById('xValues');
                    const yInput = document.getElementById('yValues');
                    if (xInput && yInput) {
                        calculatorApp.handleRegressionAnalysis({ xValues: xInput.value, yValues: yInput.value });
                    }
                };

                window.generateTable = () => {
                    const f = document.getElementById('tableFunction');
                    const s = document.getElementById('tableStart');
                    const e = document.getElementById('tableEnd');
                    const st = document.getElementById('tableStep');
                    if (f && s && e && st) {
                        calculatorApp.handleTableGeneration({
                            tableFunction: f.value,
                            tableStart: s.value,
                            tableEnd: e.value,
                            tableStep: st.value
                        });
                    }
                };

                window.showHistogram = () => {
                    const data = calculatorApp.getDataListManager().getList('L1');
                    if (data.length === 0) {
                        display.showError('Сначала рассчитайте статистику');
                        return;
                    }

                    const canvas = document.getElementById('stats-chart');
                    if (!canvas) return;

                    // Show canvas
                    canvas.style.display = 'block';
                    const ctx = canvas.getContext('2d');
                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width || 400;
                    canvas.height = rect.height || 300;

                    // Calculate histogram bins
                    const bins = Math.min(20, Math.ceil(Math.sqrt(data.length)));
                    const min = Math.min(...data);
                    const max = Math.max(...data);
                    const range = max - min || 1;
                    const binWidth = range / bins;

                    // Create bins
                    const binCounts = Array(bins).fill(0);
                    data.forEach(value => {
                        const binIndex = Math.min(Math.floor((value - min) / binWidth), bins - 1);
                        binCounts[binIndex]++;
                    });

                    const maxCount = Math.max(...binCounts);

                    // Clear canvas
                    ctx.fillStyle = '#0a0a0a';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Draw histogram
                    const padding = 50;
                    const chartWidth = canvas.width - 2 * padding;
                    const chartHeight = canvas.height - 2 * padding;
                    const barWidth = chartWidth / bins;

                    // Draw bars
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.7)';
                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 1;

                    binCounts.forEach((count, i) => {
                        const barHeight = (count / maxCount) * chartHeight;
                        const x = padding + i * barWidth;
                        const y = canvas.height - padding - barHeight;

                        ctx.fillRect(x, y, barWidth - 2, barHeight);
                        ctx.strokeRect(x, y, barWidth - 2, barHeight);
                    });

                    // Draw axes
                    ctx.strokeStyle = '#666';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(padding, padding);
                    ctx.lineTo(padding, canvas.height - padding);
                    ctx.lineTo(canvas.width - padding, canvas.height - padding);
                    ctx.stroke();

                    // X-axis labels
                    ctx.fillStyle = '#ccc';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';

                    for (let i = 0; i <= 5; i++) {
                        const value = min + (i * range / 5);
                        const x = padding + (i * chartWidth / 5);
                        ctx.fillText(value.toFixed(1), x, canvas.height - padding + 20);
                    }

                    // Y-axis labels
                    ctx.textAlign = 'right';
                    for (let i = 0; i <= 4; i++) {
                        const value = Math.round((i * maxCount / 4));
                        const y = canvas.height - padding - (i * chartHeight / 4);
                        ctx.fillText(value.toString(), padding - 10, y + 4);
                    }

                    // Title
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#fff';
                    ctx.font = '14px Arial';
                    ctx.fillText('Гистограмма', canvas.width / 2, 25);
                };

                window.showBoxPlot = () => {
                    const data = calculatorApp.getDataListManager().getList('L1');
                    if (data.length === 0) {
                        display.showError('Сначала рассчитайте статистику');
                        return;
                    }

                    const canvas = document.getElementById('stats-chart');
                    if (!canvas) return;

                    // Show canvas
                    canvas.style.display = 'block';
                    const ctx = canvas.getContext('2d');
                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width || 400;
                    canvas.height = rect.height || 300;

                    // Calculate statistics
                    const sorted = [...data].sort((a, b) => a - b);
                    const n = sorted.length;
                    const min = sorted[0];
                    const max = sorted[n - 1];
                    const median = n % 2 === 0 ? (sorted[n/2 - 1] + sorted[n/2]) / 2 : sorted[Math.floor(n/2)];
                    const q1 = sorted[Math.floor(n * 0.25)];
                    const q3 = sorted[Math.floor(n * 0.75)];
                    const iqr = q3 - q1;

                    // Calculate whiskers
                    const lowerWhisker = Math.max(min, q1 - 1.5 * iqr);
                    const upperWhisker = Math.min(max, q3 + 1.5 * iqr);

                    // Clear canvas
                    ctx.fillStyle = '#0a0a0a';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Draw box plot
                    const padding = 60;
                    const plotY = canvas.height / 2;
                    const plotHeight = 80;

                    const range = max - min || 1;
                    const scale = (canvas.width - 2 * padding) / range;
                    const getX = (value) => padding + (value - min) * scale;

                    // Box
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
                    ctx.fillRect(getX(q1), plotY - plotHeight/2, getX(q3) - getX(q1), plotHeight);

                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(getX(q1), plotY - plotHeight/2, getX(q3) - getX(q1), plotHeight);

                    // Median line
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(getX(median), plotY - plotHeight/2);
                    ctx.lineTo(getX(median), plotY + plotHeight/2);
                    ctx.stroke();

                    // Whiskers
                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;

                    // Left whisker
                    ctx.beginPath();
                    ctx.moveTo(getX(lowerWhisker), plotY);
                    ctx.lineTo(getX(q1), plotY);
                    ctx.stroke();

                    // Right whisker
                    ctx.beginPath();
                    ctx.moveTo(getX(q3), plotY);
                    ctx.lineTo(getX(upperWhisker), plotY);
                    ctx.stroke();

                    // Whisker caps
                    ctx.beginPath();
                    ctx.moveTo(getX(lowerWhisker), plotY - 20);
                    ctx.lineTo(getX(lowerWhisker), plotY + 20);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(getX(upperWhisker), plotY - 20);
                    ctx.lineTo(getX(upperWhisker), plotY + 20);
                    ctx.stroke();

                    // Outliers
                    ctx.fillStyle = '#ef4444';
                    data.forEach(value => {
                        if (value < lowerWhisker || value > upperWhisker) {
                            ctx.beginPath();
                            ctx.arc(getX(value), plotY, 5, 0, 2 * Math.PI);
                            ctx.fill();
                        }
                    });

                    // Labels
                    ctx.fillStyle = '#ccc';
                    ctx.font = '11px Arial';
                    ctx.textAlign = 'center';

                    const labels = [
                        { value: min, text: `Min: ${min.toFixed(2)}` },
                        { value: q1, text: `Q1: ${q1.toFixed(2)}` },
                        { value: median, text: `Med: ${median.toFixed(2)}` },
                        { value: q3, text: `Q3: ${q3.toFixed(2)}` },
                        { value: max, text: `Max: ${max.toFixed(2)}` }
                    ];

                    labels.forEach(({ value, text }, index) => {
                        const y = plotY + plotHeight/2 + 20 + (index % 2 === 0 ? 0 : 15);
                        ctx.fillText(text, getX(value), y);
                    });

                    // Title
                    ctx.fillStyle = '#fff';
                    ctx.font = '14px Arial';
                    ctx.fillText('Box Plot', canvas.width / 2, 25);
                };

                window.calculateTwoVarStats = () => {
                    const xInput = document.getElementById('xStatsValues');
                    const yInput = document.getElementById('yStatsValues');
                    if (!xInput || !yInput || !xInput.value || !yInput.value) {
                        display.showError('Введите данные X и Y');
                        return;
                    }

                    try {
                        const xData = xInput.value.split(/[\s,;]+/).map(n => parseFloat(n)).filter(n => !isNaN(n));
                        const yData = yInput.value.split(/[\s,;]+/).map(n => parseFloat(n)).filter(n => !isNaN(n));

                        if (xData.length !== yData.length || xData.length < 2) {
                            display.showError('X и Y должны иметь одинаковую длину (мин. 2 точки)');
                            return;
                        }

                        // Store in data lists
                        calculatorApp.getDataListManager().setList('L1', xData);
                        calculatorApp.getDataListManager().setList('L2', yData);

                        // Calculate statistics
                        const n = xData.length;
                        const sumX = xData.reduce((a, b) => a + b, 0);
                        const sumY = yData.reduce((a, b) => a + b, 0);
                        const sumXY = xData.reduce((acc, xi, i) => acc + xi * yData[i], 0);
                        const sumX2 = xData.reduce((acc, xi) => acc + xi * xi, 0);
                        const sumY2 = yData.reduce((acc, yi) => acc + yi * yi, 0);

                        const meanX = sumX / n;
                        const meanY = sumY / n;

                        // Correlation coefficient
                        const r = (n * sumXY - sumX * sumY) /
                                  Math.sqrt((n * sumX2 - sumX * sumX) * (n * sumY2 - sumY * sumY));

                        // Linear regression
                        const a = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                        const b = (sumY - a * sumX) / n;

                        // Update UI
                        document.getElementById('twoVarN').textContent = n;
                        document.getElementById('twoVarMeanX').textContent = meanX.toFixed(6);
                        document.getElementById('twoVarMeanY').textContent = meanY.toFixed(6);
                        document.getElementById('twoVarSumXY').textContent = sumXY.toFixed(6);
                        document.getElementById('twoVarR').textContent = r.toFixed(6);
                        document.getElementById('twoVarRegression').textContent = `y = ${a.toFixed(4)}x + ${b.toFixed(4)}`;

                        document.getElementById('twoVarResults').style.display = 'block';

                        calculatorApp.notificationManager.showSuccess('Статистика рассчитана');
                    } catch (e) {
                        display.showError('Ошибка расчета: ' + e.message);
                    }
                };

                window.showScatterPlot = () => {
                    const xData = calculatorApp.getDataListManager().getList('L1');
                    const yData = calculatorApp.getDataListManager().getList('L2');

                    if (xData.length === 0 || yData.length === 0) {
                        display.showError('Сначала рассчитайте 2-Var Stats');
                        return;
                    }

                    const canvas = document.getElementById('stats-chart');
                    if (!canvas) return;

                    canvas.style.display = 'block';
                    const ctx = canvas.getContext('2d');
                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width || 400;
                    canvas.height = rect.height || 300;

                    // Clear canvas
                    ctx.fillStyle = '#0a0a0a';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    const padding = 50;
                    const chartWidth = canvas.width - 2 * padding;
                    const chartHeight = canvas.height - 2 * padding;

                    // Find data bounds
                    const minX = Math.min(...xData);
                    const maxX = Math.max(...xData);
                    const minY = Math.min(...yData);
                    const maxY = Math.max(...yData);

                    const rangeX = maxX - minX || 1;
                    const rangeY = maxY - minY || 1;

                    // Scale functions
                    const scaleX = (x) => padding + ((x - minX) / rangeX) * chartWidth;
                    const scaleY = (y) => canvas.height - padding - ((y - minY) / rangeY) * chartHeight;

                    // Draw axes
                    ctx.strokeStyle = '#666';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(padding, padding);
                    ctx.lineTo(padding, canvas.height - padding);
                    ctx.lineTo(canvas.width - padding, canvas.height - padding);
                    ctx.stroke();

                    // Draw axis labels
                    ctx.fillStyle = '#ccc';
                    ctx.font = '12px Arial';
                    ctx.textAlign = 'center';

                    for (let i = 0; i <= 4; i++) {
                        const xVal = minX + (i * rangeX / 4);
                        const yVal = minY + (i * rangeY / 4);
                        ctx.fillText(xVal.toFixed(1), scaleX(xVal), canvas.height - padding + 20);
                        ctx.fillText(yVal.toFixed(1), padding - 25, scaleY(yVal) + 4);
                    }

                    // Draw data points
                    ctx.fillStyle = '#3b82f6';
                    for (let i = 0; i < xData.length; i++) {
                        ctx.beginPath();
                        ctx.arc(scaleX(xData[i]), scaleY(yData[i]), 6, 0, 2 * Math.PI);
                        ctx.fill();
                    }

                    // Draw regression line
                    const n = xData.length;
                    const sumX = xData.reduce((a, b) => a + b, 0);
                    const sumY = yData.reduce((a, b) => a + b, 0);
                    const sumXY = xData.reduce((acc, xi, i) => acc + xi * yData[i], 0);
                    const sumX2 = xData.reduce((acc, xi) => acc + xi * xi, 0);

                    const a = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                    const b = (sumY - a * sumX) / n;

                    ctx.strokeStyle = '#10b981';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(scaleX(minX), scaleY(a * minX + b));
                    ctx.lineTo(scaleX(maxX), scaleY(a * maxX + b));
                    ctx.stroke();

                    // Legend
                    ctx.fillStyle = '#10b981';
                    ctx.fillRect(canvas.width - 150, 20, 15, 15);
                    ctx.fillStyle = '#ccc';
                    ctx.textAlign = 'left';
                    ctx.fillText(`y = ${a.toFixed(2)}x + ${b.toFixed(2)}`, canvas.width - 130, 32);
                };

                window.calculateDistribution = () => {
                    const distType = document.getElementById('distributionType').value;
                    const param1 = parseFloat(document.getElementById('distParam1').value);
                    const param2 = parseFloat(document.getElementById('distParam2').value);
                    const x = parseFloat(document.getElementById('distX').value);

                    if (isNaN(x)) {
                        display.showError('Введите значение x');
                        return;
                    }

                    let pdf, cdf, mean, variance;

                    try {
                        switch (distType) {
                            case 'normal':
                                const mu = isNaN(param1) ? 0 : param1;
                                const sigma = isNaN(param2) ? 1 : param2;
                                pdf = (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
                                // CDF approximation using error function
                                const z = (x - mu) / (sigma * Math.sqrt(2));
                                cdf = 0.5 * (1 + erf(z));
                                mean = mu;
                                variance = sigma * sigma;
                                break;

                            case 'binomial':
                                const n = Math.floor(isNaN(param1) ? 10 : param1);
                                const p = isNaN(param2) ? 0.5 : param2;
                                const k = Math.floor(x);
                                if (k < 0 || k > n) {
                                    pdf = 0;
                                } else {
                                    const comb = factorial(n) / (factorial(k) * factorial(n - k));
                                    pdf = comb * Math.pow(p, k) * Math.pow(1 - p, n - k);
                                }
                                cdf = 0;
                                for (let i = 0; i <= k; i++) {
                                    const c = factorial(n) / (factorial(i) * factorial(n - i));
                                    cdf += c * Math.pow(p, i) * Math.pow(1 - p, n - i);
                                }
                                mean = n * p;
                                variance = n * p * (1 - p);
                                break;

                            case 'poisson':
                                const lambda = isNaN(param1) ? 1 : param1;
                                const pk = Math.floor(x);
                                if (pk < 0) {
                                    pdf = 0;
                                } else {
                                    pdf = Math.exp(-lambda) * Math.pow(lambda, pk) / factorial(pk);
                                }
                                cdf = 0;
                                for (let i = 0; i <= pk; i++) {
                                    cdf += Math.exp(-lambda) * Math.pow(lambda, i) / factorial(i);
                                }
                                mean = lambda;
                                variance = lambda;
                                break;

                            case 'exponential':
                                const lambdaExp = isNaN(param1) ? 1 : param1;
                                if (x < 0) {
                                    pdf = 0;
                                    cdf = 0;
                                } else {
                                    pdf = lambdaExp * Math.exp(-lambdaExp * x);
                                    cdf = 1 - Math.exp(-lambdaExp * x);
                                }
                                mean = 1 / lambdaExp;
                                variance = 1 / (lambdaExp * lambdaExp);
                                break;

                            case 'uniform':
                                const a = isNaN(param1) ? 0 : param1;
                                const b = isNaN(param2) ? 1 : param2;
                                if (x < a || x > b) {
                                    pdf = 0;
                                } else {
                                    pdf = 1 / (b - a);
                                }
                                if (x < a) {
                                    cdf = 0;
                                } else if (x > b) {
                                    cdf = 1;
                                } else {
                                    cdf = (x - a) / (b - a);
                                }
                                mean = (a + b) / 2;
                                variance = Math.pow(b - a, 2) / 12;
                                break;
                        }

                        document.getElementById('distPDF').textContent = pdf.toFixed(8);
                        document.getElementById('distCDF').textContent = cdf.toFixed(8);
                        document.getElementById('distMean').textContent = mean.toFixed(6);
                        document.getElementById('distVar').textContent = variance.toFixed(6);

                        document.getElementById('distributionResults').style.display = 'block';

                        calculatorApp.notificationManager.showSuccess('Распределение рассчитано');
                    } catch (e) {
                        display.showError('Ошибка расчета: ' + e.message);
                    }

                    // Helper functions
                    function erf(x) {
                        const a1 =  0.254829592;
                        const a2 = -0.284496736;
                        const a3 =  1.421413741;
                        const a4 = -1.453152027;
                        const a5 =  1.061405429;
                        const p  =  0.3275911;

                        const sign = x >= 0 ? 1 : -1;
                        x = Math.abs(x);

                        const t = 1.0 / (1.0 + p * x);
                        const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);

                        return sign * y;
                    }

                    function factorial(n) {
                        if (n < 0) return NaN;
                        if (n === 0 || n === 1) return 1;
                        let result = 1;
                        for (let i = 2; i <= n; i++) {
                            result *= i;
                        }
                        return result;
                    }
                };

                window.performTest = () => {
                    const testType = document.getElementById('testType').value;
                    const input = document.getElementById('testInput').value;

                    if (!input) {
                        display.showError('Введите данные для теста');
                        return;
                    }

                    try {
                        let result;

                        switch (testType) {
                            case 'ttest':
                                const data = input.split(/[\s,;]+/).map(n => parseFloat(n)).filter(n => !isNaN(n));
                                if (data.length < 2) {
                                    display.showError('Нужно минимум 2 значения');
                                    return;
                                }

                                const n = data.length;
                                const mean = data.reduce((a, b) => a + b, 0) / n;
                                const variance = data.reduce((sum, x) => sum + Math.pow(x - mean, 2), 0) / (n - 1);
                                const stdError = Math.sqrt(variance / n);
                                const mu0 = 0; // Test against 0

                                const tStat = (mean - mu0) / stdError;
                                const df = n - 1;

                                // Approximate p-value using t-distribution
                                const pValue = 2 * (1 - tCDF(Math.abs(tStat), df));

                                result = {
                                    statistic: tStat,
                                    pValue: pValue,
                                    conclusion: pValue < 0.05 ? 'Отклонить H₀ (p < 0.05)' : 'Не отклонять H₀ (p ≥ 0.05)'
                                };
                                break;

                            case 'ztest':
                                const zData = input.split(/[\s,;]+/).map(n => parseFloat(n)).filter(n => !isNaN(n));
                                if (zData.length < 2) {
                                    display.showError('Нужно минимум 2 значения');
                                    return;
                                }

                                const nZ = zData.length;
                                const meanZ = zData.reduce((a, b) => a + b, 0) / nZ;
                                const stdDevZ = Math.sqrt(zData.reduce((sum, x) => sum + Math.pow(x - meanZ, 2), 0) / nZ);
                                const stdErrorZ = stdDevZ / Math.sqrt(nZ);

                                const zStat = (meanZ - 0) / stdErrorZ;
                                const pValueZ = 2 * (1 - normalCDF(Math.abs(zStat)));

                                result = {
                                    statistic: zStat,
                                    pValue: pValueZ,
                                    conclusion: pValueZ < 0.05 ? 'Отклонить H₀ (p < 0.05)' : 'Не отклонять H₀ (p ≥ 0.05)'
                                };
                                break;

                            case 'chi2':
                                // Expect observed:expected format or just observed (uniform expected)
                                const lines = input.trim().split('\n');
                                let observed, expected;

                                if (lines.length === 2) {
                                    observed = lines[0].split(/[\s,;]+/).map(n => parseFloat(n)).filter(n => !isNaN(n));
                                    expected = lines[1].split(/[\s,;]+/).map(n => parseFloat(n)).filter(n => !isNaN(n));
                                } else {
                                    observed = lines[0].split(/[\s,;]+/).map(n => parseFloat(n)).filter(n => !isNaN(n));
                                    const total = observed.reduce((a, b) => a + b, 0);
                                    expected = observed.map(() => total / observed.length);
                                }

                                if (observed.length !== expected.length) {
                                    display.showError('Наблюдаемые и ожидаемые значения должны иметь одинаковую длину');
                                    return;
                                }

                                let chiStat = 0;
                                for (let i = 0; i < observed.length; i++) {
                                    chiStat += Math.pow(observed[i] - expected[i], 2) / expected[i];
                                }

                                const dfChi = observed.length - 1;
                                const pValueChi = 1 - chi2CDF(chiStat, dfChi);

                                result = {
                                    statistic: chiStat,
                                    pValue: pValueChi,
                                    conclusion: pValueChi < 0.05 ? 'Отклонить H₀ (p < 0.05)' : 'Не отклонять H₀ (p ≥ 0.05)'
                                };
                                break;

                            case 'anova':
                                // Each line is a group
                                const groups = input.trim().split('\n').map(line =>
                                    line.split(/[\s,;]+/).map(n => parseFloat(n)).filter(n => !isNaN(n))
                                ).filter(g => g.length > 0);

                                if (groups.length < 2) {
                                    display.showError('Нужно минимум 2 группы (каждая на новой строке)');
                                    return;
                                }

                                // Calculate ANOVA
                                const allData = groups.flat();
                                const grandMean = allData.reduce((a, b) => a + b, 0) / allData.length;

                                let ssBetween = 0;
                                let ssWithin = 0;

                                groups.forEach(group => {
                                    const groupMean = group.reduce((a, b) => a + b, 0) / group.length;
                                    ssBetween += group.length * Math.pow(groupMean - grandMean, 2);
                                    group.forEach(val => {
                                        ssWithin += Math.pow(val - groupMean, 2);
                                    });
                                });

                                const dfBetween = groups.length - 1;
                                const dfWithin = allData.length - groups.length;

                                const msBetween = ssBetween / dfBetween;
                                const msWithin = ssWithin / dfWithin;

                                const fStat = msBetween / msWithin;
                                const pValueF = 1 - fCDF(fStat, dfBetween, dfWithin);

                                result = {
                                    statistic: fStat,
                                    pValue: pValueF,
                                    conclusion: pValueF < 0.05 ? 'Отклонить H₀ (p < 0.05)' : 'Не отклонять H₀ (p ≥ 0.05)'
                                };
                                break;
                        }

                        document.getElementById('testStat').textContent = result.statistic.toFixed(6);
                        document.getElementById('testPValue').textContent = result.pValue.toFixed(6);
                        document.getElementById('testConclusion').textContent = result.conclusion;

                        document.getElementById('testResults').style.display = 'block';

                        calculatorApp.notificationManager.showSuccess('Тест выполнен');
                    } catch (e) {
                        display.showError('Ошибка: ' + e.message);
                    }

                    // Helper distribution functions
                    function normalCDF(x) {
                        return 0.5 * (1 + erf(x / Math.sqrt(2)));
                    }

                    function erf(x) {
                        const a1 =  0.254829592;
                        const a2 = -0.284496736;
                        const a3 =  1.421413741;
                        const a4 = -1.453152027;
                        const a5 =  1.061405429;
                        const p  =  0.3275911;

                        const sign = x >= 0 ? 1 : -1;
                        x = Math.abs(x);

                        const t = 1.0 / (1.0 + p * x);
                        const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);

                        return sign * y;
                    }

                    function tCDF(t, df) {
                        // Approximation for t-distribution CDF
                        const x = df / (df + t * t);
                        return 1 - 0.5 * betaIncomplete(x, df / 2, 0.5);
                    }

                    function chi2CDF(x, df) {
                        // Approximation using gamma incomplete
                        return gammaIncomplete(df / 2, x / 2);
                    }

                    function fCDF(f, df1, df2) {
                        // Approximation for F-distribution
                        const x = df1 * f / (df1 * f + df2);
                        return betaIncomplete(x, df1 / 2, df2 / 2);
                    }

                    function gammaIncomplete(a, x) {
                        // Regularized lower incomplete gamma function approximation
                        if (x < 0) return 0;
                        if (x === 0) return 0;

                        let sum = 0;
                        let term = 1 / a;
                        sum = term;

                        for (let n = 1; n < 100; n++) {
                            term *= x / (a + n);
                            sum += term;
                            if (Math.abs(term) < 1e-10) break;
                        }

                        return sum * Math.exp(-x + a * Math.log(x) - logGamma(a));
                    }

                    function betaIncomplete(x, a, b) {
                        if (x < 0 || x > 1) return 0;
                        if (x === 0) return 0;
                        if (x === 1) return 1;

                        // Continued fraction approximation
                        const bt = Math.exp(logGamma(a + b) - logGamma(a) - logGamma(b) + a * Math.log(x) + b * Math.log(1 - x));

                        if (x < (a + 1) / (a + b + 2)) {
                            return bt * betaCF(x, a, b) / a;
                        } else {
                            return 1 - bt * betaCF(1 - x, b, a) / b;
                        }
                    }

                    function betaCF(x, a, b) {
                        const maxIterations = 100;
                        const epsilon = 1e-10;

                        let c = 1;
                        let d = 1 - (a + b) * x / (a + 1);
                        if (Math.abs(d) < epsilon) d = epsilon;
                        d = 1 / d;
                        let result = d;

                        for (let m = 1; m <= maxIterations; m++) {
                            const m2 = 2 * m;

                            let aa = m * (b - m) * x / ((a + m2 - 1) * (a + m2));
                            d = 1 + aa * d;
                            if (Math.abs(d) < epsilon) d = epsilon;
                            c = 1 + aa / c;
                            if (Math.abs(c) < epsilon) c = epsilon;
                            d = 1 / d;
                            result *= d * c;

                            aa = -(a + m) * (a + b + m) * x / ((a + m2) * (a + m2 + 1));
                            d = 1 + aa * d;
                            if (Math.abs(d) < epsilon) d = epsilon;
                            c = 1 + aa / c;
                            if (Math.abs(c) < epsilon) c = epsilon;
                            d = 1 / d;
                            const delta = d * c;
                            result *= delta;

                            if (Math.abs(delta - 1) < epsilon) break;
                        }

                        return result;
                    }

                    function logGamma(x) {
                        // Stirling approximation
                        const coefficients = [
                            76.18009172947146,
                            -86.50532032941677,
                            24.01409824083091,
                            -1.231739572450155,
                            0.1208650973866179e-2,
                            -0.5395239384953e-5
                        ];

                        let y = x;
                        let tmp = x + 5.5;
                        tmp -= (x + 0.5) * Math.log(tmp);
                        let ser = 1.000000000190015;

                        for (let j = 0; j < 6; j++) {
                            ser += coefficients[j] / ++y;
                        }

                        return -tmp + Math.log(2.5066282746310005 * ser / x);
                    }
                };

                // Matrix class for operations
                class MatrixCalc {
                    constructor(rows, cols, data = null) {
                        this.rows = rows;
                        this.cols = cols;
                        this.data = data || Array(rows).fill(null).map(() => Array(cols).fill(0));
                    }

                    static fromArray(arr) {
                        return new MatrixCalc(arr.length, arr[0].length, arr.map(row => [...row]));
                    }

                    clone() {
                        return new MatrixCalc(this.rows, this.cols, this.data.map(row => [...row]));
                    }

                    add(other) {
                        if (this.rows !== other.rows || this.cols !== other.cols) {
                            throw new Error('Матрицы должны иметь одинаковый размер');
                        }
                        const result = new MatrixCalc(this.rows, this.cols);
                        for (let i = 0; i < this.rows; i++) {
                            for (let j = 0; j < this.cols; j++) {
                                result.data[i][j] = this.data[i][j] + other.data[i][j];
                            }
                        }
                        return result;
                    }

                    subtract(other) {
                        if (this.rows !== other.rows || this.cols !== other.cols) {
                            throw new Error('Матрицы должны иметь одинаковый размер');
                        }
                        const result = new MatrixCalc(this.rows, this.cols);
                        for (let i = 0; i < this.rows; i++) {
                            for (let j = 0; j < this.cols; j++) {
                                result.data[i][j] = this.data[i][j] - other.data[i][j];
                            }
                        }
                        return result;
                    }

                    multiply(other) {
                        if (this.cols !== other.rows) {
                            throw new Error(`Невозможно умножить: ${this.rows}×${this.cols} на ${other.rows}×${other.cols}`);
                        }
                        const result = new MatrixCalc(this.rows, other.cols);
                        for (let i = 0; i < this.rows; i++) {
                            for (let j = 0; j < other.cols; j++) {
                                let sum = 0;
                                for (let k = 0; k < this.cols; k++) {
                                    sum += this.data[i][k] * other.data[k][j];
                                }
                                result.data[i][j] = sum;
                            }
                        }
                        return result;
                    }

                    scalarMultiply(scalar) {
                        const result = new MatrixCalc(this.rows, this.cols);
                        for (let i = 0; i < this.rows; i++) {
                            for (let j = 0; j < this.cols; j++) {
                                result.data[i][j] = this.data[i][j] * scalar;
                            }
                        }
                        return result;
                    }

                    transpose() {
                        const result = new MatrixCalc(this.cols, this.rows);
                        for (let i = 0; i < this.rows; i++) {
                            for (let j = 0; j < this.cols; j++) {
                                result.data[j][i] = this.data[i][j];
                            }
                        }
                        return result;
                    }

                    determinant() {
                        if (this.rows !== this.cols) {
                            throw new Error('Определитель существует только для квадратных матриц');
                        }
                        const n = this.rows;
                        const matrix = this.clone();
                        let det = 1;
                        let swaps = 0;

                        for (let col = 0; col < n; col++) {
                            let maxRow = col;
                            for (let row = col + 1; row < n; row++) {
                                if (Math.abs(matrix.data[row][col]) > Math.abs(matrix.data[maxRow][col])) {
                                    maxRow = row;
                                }
                            }

                            if (maxRow !== col) {
                                [matrix.data[col], matrix.data[maxRow]] = [matrix.data[maxRow], matrix.data[col]];
                                swaps++;
                            }

                            if (Math.abs(matrix.data[col][col]) < 1e-10) {
                                return 0;
                            }

                            det *= matrix.data[col][col];

                            for (let row = col + 1; row < n; row++) {
                                const factor = matrix.data[row][col] / matrix.data[col][col];
                                for (let j = col; j < n; j++) {
                                    matrix.data[row][j] -= factor * matrix.data[col][j];
                                }
                            }
                        }

                        return swaps % 2 === 0 ? det : -det;
                    }

                    inverse() {
                        if (this.rows !== this.cols) {
                            throw new Error('Обратная матрица существует только для квадратных матриц');
                        }

                        const n = this.rows;
                        const det = this.determinant();

                        if (Math.abs(det) < 1e-10) {
                            throw new Error('Матрица вырожденная (det = 0)');
                        }

                        const augmented = new MatrixCalc(n, 2 * n);
                        for (let i = 0; i < n; i++) {
                            for (let j = 0; j < n; j++) {
                                augmented.data[i][j] = this.data[i][j];
                                augmented.data[i][j + n] = i === j ? 1 : 0;
                            }
                        }

                        for (let col = 0; col < n; col++) {
                            let maxRow = col;
                            for (let row = col + 1; row < n; row++) {
                                if (Math.abs(augmented.data[row][col]) > Math.abs(augmented.data[maxRow][col])) {
                                    maxRow = row;
                                }
                            }

                            [augmented.data[col], augmented.data[maxRow]] = [augmented.data[maxRow], augmented.data[col]];

                            const pivot = augmented.data[col][col];
                            for (let j = 0; j < 2 * n; j++) {
                                augmented.data[col][j] /= pivot;
                            }

                            for (let row = 0; row < n; row++) {
                                if (row !== col) {
                                    const factor = augmented.data[row][col];
                                    for (let j = 0; j < 2 * n; j++) {
                                        augmented.data[row][j] -= factor * augmented.data[col][j];
                                    }
                                }
                            }
                        }

                        const inv = new MatrixCalc(n, n);
                        for (let i = 0; i < n; i++) {
                            for (let j = 0; j < n; j++) {
                                inv.data[i][j] = augmented.data[i][j + n];
                            }
                        }

                        return inv;
                    }

                    trace() {
                        if (this.rows !== this.cols) {
                            throw new Error('След существует только для квадратных матриц');
                        }
                        let sum = 0;
                        for (let i = 0; i < this.rows; i++) {
                            sum += this.data[i][i];
                        }
                        return sum;
                    }
                }

                // Matrix Operations
                window.matrixAdd = () => {
                    try {
                        const dataA = readMatrixFromGrid('matrixAGrid', matrixState.A.rows, matrixState.A.cols);

                window.matrixSubtract = () => {
                    try {
                        const dataA = readMatrixFromGrid('matrixAGrid', matrixState.A.rows, matrixState.A.cols);
                        const dataB = readMatrixFromGrid('matrixBGrid', matrixState.B.rows, matrixState.B.cols);
                        const A = MatrixCalc.fromArray(dataA);
                        const B = MatrixCalc.fromArray(dataB);
                        const result = A.subtract(B);
                        writeMatrixToGrid('matrixResultGrid', result.data);
                        calculatorApp.notificationManager.showSuccess('A - B вычислено');
                    } catch (e) {
                        display.showError(e.message);
                    }
                };

                window.matrixMultiply = () => {
                    try {
                        const dataA = readMatrixFromGrid('matrixAGrid', matrixState.A.rows, matrixState.A.cols);
                        const dataB = readMatrixFromGrid('matrixBGrid', matrixState.B.rows, matrixState.B.cols);
                        const A = MatrixCalc.fromArray(dataA);
                        const B = MatrixCalc.fromArray(dataB);
                        const result = A.multiply(B);
                        writeMatrixToGrid('matrixResultGrid', result.data);
                        calculatorApp.notificationManager.showSuccess('A × B вычислено');
                    } catch (e) {
                        display.showError(e.message);
                    }
                };

                window.matrixTransposeA = () => {
                    try {
                        const dataA = readMatrixFromGrid('matrixAGrid', matrixState.A.rows, matrixState.A.cols);
                        const A = MatrixCalc.fromArray(dataA);
                        const result = A.transpose();
                        writeMatrixToGrid('matrixResultGrid', result.data);
                        calculatorApp.notificationManager.showSuccess('A^T вычислено');
                    } catch (e) {
                        display.showError(e.message);
                    }
                };

                window.matrixTransposeB = () => {
                    try {
                        const dataB = readMatrixFromGrid('matrixBGrid', matrixState.B.rows, matrixState.B.cols);
                        const B = MatrixCalc.fromArray(dataB);
                        const result = B.transpose();
                        writeMatrixToGrid('matrixResultGrid', result.data);
                        calculatorApp.notificationManager.showSuccess('B^T вычислено');
                    } catch (e) {
                        display.showError(e.message);
                    }
                };

                window.matrixScalarMultiply = () => {
                    const section = document.getElementById('scalarInputSection');
                    if (section) {
                        section.style.display = section.style.display === 'none' ? 'flex' : 'none';
                    }
                };

                window.applyScalarMultiply = () => {
                    try {
                        const scalar = parseFloat(document.getElementById('scalarValue')?.value) || 0;
                        const dataA = readMatrixFromGrid('matrixAGrid', matrixState.A.rows, matrixState.A.cols);
                        const A = MatrixCalc.fromArray(dataA);
                        const result = A.scalarMultiply(scalar);
                        writeMatrixToGrid('matrixResultGrid', result.data);
                        document.getElementById('scalarInputSection').style.display = 'none';
                        calculatorApp.notificationManager.showSuccess(`${scalar} × A вычислено`);
                    } catch (e) {
                        display.showError(e.message);
                    }
                };

                // Determinant tab functions
                window.updateDetMatrix = () => {
                    const size = parseInt(document.getElementById('detMatrixSize')?.value) || 3;
                    matrixState.det.size = size;
                    const sizeDisplay = document.getElementById('detMatrixSizeDisplay');
                    if (sizeDisplay) sizeDisplay.textContent = size;
                    createMatrixGrid('detMatrixGrid', size, size);
                };

                window.fillDetMatrixRandom = () => {
                    const container = document.getElementById('detMatrixGrid');
                    if (!container) return;
                    container.querySelectorAll('input').forEach(input => {
                        input.value = Math.floor(Math.random() * 21) - 10;
                    });
                };

                window.fillDetMatrixIdentity = () => {
                    const container = document.getElementById('detMatrixGrid');
                    if (!container) return;
                    container.querySelectorAll('input').forEach(input => {
                        const r = parseInt(input.dataset.row);
                        const c = parseInt(input.dataset.col);
                        input.value = r === c ? 1 : 0;
                    });
                };

                window.calculateDeterminant = () => {
                    try {
                        const size = matrixState.det.size;
                        const data = readMatrixFromGrid('detMatrixGrid', size, size);
                        const matrix = MatrixCalc.fromArray(data);
                        const det = matrix.determinant();

                        document.getElementById('detValue').textContent = det.toFixed(6);

                        let matrixType = '';
                        if (Math.abs(det) < 1e-10) {
                            matrixType = 'Вырожденная (сингулярная)';
                        } else if (Math.abs(det - 1) < 1e-10) {
                            matrixType = 'Унимодулярная (det = 1)';
                        } else if (Math.abs(det + 1) < 1e-10) {
                            matrixType = 'det = -1';
                        } else {
                            matrixType = 'Невырожденная';
                        }
                        document.getElementById('detMatrixType').textContent = matrixType;

                        document.getElementById('detResults').style.display = 'block';
                        calculatorApp.notificationManager.showSuccess('Определитель вычислен');
                    } catch (e) {
                        display.showError(e.message);
                    }
                };

                // Inverse tab functions
                window.updateInvMatrix = () => {
                    const size = parseInt(document.getElementById('invMatrixSize')?.value) || 3;
                    matrixState.inv.size = size;
                    const sizeDisplay = document.getElementById('invMatrixSizeDisplay');
                    if (sizeDisplay) sizeDisplay.textContent = size;
                    createMatrixGrid('invMatrixGrid', size, size);
                };

                window.fillInvMatrixRandom = () => {
                    const container = document.getElementById('invMatrixGrid');
                    if (!container) return;
                    container.querySelectorAll('input').forEach(input => {
                        input.value = Math.floor(Math.random() * 21) - 10;
                    });
                };

                window.fillInvMatrixIdentity = () => {
                    const container = document.getElementById('invMatrixGrid');
                    if (!container) return;
                    container.querySelectorAll('input').forEach(input => {
                        const r = parseInt(input.dataset.row);
                        const c = parseInt(input.dataset.col);
                        input.value = r === c ? 1 : 0;
                    });
                };

                window.calculateInverse = () => {
                    try {
                        const size = matrixState.inv.size;
                        const data = readMatrixFromGrid('invMatrixGrid', size, size);
                        const matrix = MatrixCalc.fromArray(data);
                        const det = matrix.determinant();

                        document.getElementById('invDetValue').textContent = det.toFixed(6);

                        if (Math.abs(det) < 1e-10) {
                            document.getElementById('invStatus').textContent = 'Обратной матрицы не существует (det = 0)';
                            document.getElementById('invResultGrid').innerHTML = '<div style="color: var(--error); padding: 20px;">Матрица вырожденная</div>';
                            return;
                        }

                        const inv = matrix.inverse();
                        writeMatrixToGrid('invResultGrid', inv.data);
                        document.getElementById('invStatus').textContent = 'Обратная матрица найдена';
                        document.getElementById('invResults').style.display = 'block';
                        calculatorApp.notificationManager.showSuccess('Обратная матрица вычислена');
                    } catch (e) {
                        display.showError(e.message);
                    }
                };

                // Eigenvalues tab functions
                window.updateEigenMatrix = () => {
                    const size = parseInt(document.getElementById('eigenMatrixSize')?.value) || 3;
                    matrixState.eigen.size = size;
                    const sizeDisplay = document.getElementById('eigenMatrixSizeDisplay');
                    if (sizeDisplay) sizeDisplay.textContent = size;
                    createMatrixGrid('eigenMatrixGrid', size, size);
                };

                window.fillEigenMatrixRandom = () => {
                    const container = document.getElementById('eigenMatrixGrid');
                    if (!container) return;
                    container.querySelectorAll('input').forEach(input => {
                        input.value = Math.floor(Math.random() * 21) - 10;
                    });
                };

                window.fillEigenMatrixSymmetric = () => {
                    const size = matrixState.eigen.size;
                    const container = document.getElementById('eigenMatrixGrid');
                    if (!container) return;

                    const values = [];
                    for (let i = 0; i < size; i++) {
                        values[i] = [];
                        for (let j = 0; j < size; j++) {
                            if (j >= i) {
                                values[i][j] = Math.floor(Math.random() * 21) - 10;
                            } else {
                                values[i][j] = values[j][i];
                            }
                        }
                    }

                    container.querySelectorAll('input').forEach(input => {
                        const r = parseInt(input.dataset.row);
                        const c = parseInt(input.dataset.col);
                        input.value = values[r][c];
                    });
                };

                window.calculateEigenvalues = () => {
                    try {
                        const size = matrixState.eigen.size;
                        const data = readMatrixFromGrid('eigenMatrixGrid', size, size);
                        const matrix = MatrixCalc.fromArray(data);
                        const trace = matrix.trace();
                        const det = matrix.determinant();

                        document.getElementById('eigenTrace').textContent = trace.toFixed(6);
                        document.getElementById('eigenDet').textContent = det.toFixed(6);

                        if (size === 2) {
                            const discriminant = trace * trace - 4 * det;
                            let eigenStr, polyStr;

                            polyStr = `λ² - ${trace.toFixed(4)}λ + ${det.toFixed(4)} = 0`;

                            if (discriminant >= 0) {
                                const lambda1 = (trace + Math.sqrt(discriminant)) / 2;
                                const lambda2 = (trace - Math.sqrt(discriminant)) / 2;
                                eigenStr = `λ₁ = ${lambda1.toFixed(6)}, λ₂ = ${lambda2.toFixed(6)}`;
                            } else {
                                const realPart = trace / 2;
                                const imagPart = Math.sqrt(-discriminant) / 2;
                                eigenStr = `λ₁ = ${realPart.toFixed(4)} + ${imagPart.toFixed(4)}i, λ₂ = ${realPart.toFixed(4)} - ${imagPart.toFixed(4)}i`;
                            }

                            document.getElementById('eigenValues').textContent = eigenStr;
                            document.getElementById('eigenPoly').textContent = polyStr;
                        } else if (size === 3) {
                            const a = data;
                            const c = (a[0][0] * a[1][1] + a[1][1] * a[2][2] + a[0][0] * a[2][2]) -
                                      (a[0][1] * a[1][0] + a[1][2] * a[2][1] + a[0][2] * a[2][0]);

                            const polyStr = `λ³ - ${trace.toFixed(4)}λ² + ${c.toFixed(4)}λ - ${det.toFixed(4)} = 0`;
                            document.getElementById('eigenPoly').textContent = polyStr;

                            const eigenvalues = solveCubicEigen(-trace, c, -det);
                            const eigenStr = eigenvalues.map((e, i) => `λ${i + 1} = ${typeof e === 'number' ? e.toFixed(6) : e}`).join(', ');
                            document.getElementById('eigenValues').textContent = eigenStr;
                        } else {
                            document.getElementById('eigenValues').textContent = 'Используйте численные методы для матриц > 3×3';
                            document.getElementById('eigenPoly').textContent = 'N/A';
                        }

                        document.getElementById('eigenResults').style.display = 'block';
                        calculatorApp.notificationManager.showSuccess('Собственные числа вычислены');
                    } catch (e) {
                        display.showError(e.message);
                    }
                };

                function solveCubicEigen(a, b, c) {
                    const p = b - a * a / 3;
                    const q = 2 * a * a * a / 27 - a * b / 3 + c;
                    const D = q * q / 4 + p * p * p / 27;

                    const roots = [];

                    if (D > 1e-10) {
                        const sqrtD = Math.sqrt(D);
                        const u = Math.cbrt(-q / 2 + sqrtD);
                        const v = Math.cbrt(-q / 2 - sqrtD);
                        roots.push(u + v - a / 3);                 // one real root
                        const re = -(u + v) / 2 - a / 3;           // complex conjugate pair
                        const im = Math.abs(u - v) * Math.sqrt(3) / 2;
                        roots.push(`${re.toFixed(6)} + ${im.toFixed(6)}i`);
                        roots.push(`${re.toFixed(6)} - ${im.toFixed(6)}i`);
                    } else if (D < -1e-10) {
                        const r = Math.sqrt(-p * p * p / 27);
                        const theta = Math.acos(-q / (2 * r));
                        const cubeRootR = Math.cbrt(r);

                        roots.push(2 * cubeRootR * Math.cos(theta / 3) - a / 3);
                        roots.push(2 * cubeRootR * Math.cos((theta + 2 * Math.PI) / 3) - a / 3);
                        roots.push(2 * cubeRootR * Math.cos((theta + 4 * Math.PI) / 3) - a / 3);
                    } else {
                        if (Math.abs(q) < 1e-10) {
                            roots.push(-a / 3, -a / 3, -a / 3);    // triple root
                        } else {
                            roots.push(3 * q / p - a / 3);
                            const dbl = -3 * q / (2 * p) - a / 3;  // double root (multiplicity 2)
                            roots.push(dbl, dbl);
                        }
                    }

                    return roots
                        .map(r => (typeof r === 'number' && Math.abs(r) < 1e-10) ? 0 : r)
                        .sort((x, y) => (typeof x === 'number' && typeof y === 'number') ? y - x : 0);
                }

                // System of linear equations tab functions
                window.updateSystemMatrix = () => {
                    const equations = parseInt(document.getElementById('sysEquations')?.value) || 3;
                    const variables = parseInt(document.getElementById('sysVariables')?.value) || 3;
                    matrixState.sys.equations = equations;
                    matrixState.sys.variables = variables;
                    createMatrixGrid('sysMatrixGrid', equations, variables + 1, true, true, variables);
                };

                window.fillSystemRandom = () => {
                    const container = document.getElementById('sysMatrixGrid');
                    if (!container) return;
                    container.querySelectorAll('input').forEach(input => {
                        input.value = Math.floor(Math.random() * 21) - 10;
                    });
                };

                window.clearSystemMatrix = () => {
                    const container = document.getElementById('sysMatrixGrid');
                    if (!container) return;
                    container.querySelectorAll('input').forEach(input => {
                        input.value = 0;
                    });
                };

                window.solveSystem = () => {
                    try {
                        const m = matrixState.sys.equations;
                        const n = matrixState.sys.variables;
                        const data = readMatrixFromGrid('sysMatrixGrid', m, n + 1);
                        const matrix = MatrixCalc.fromArray(data);

                        const result = gaussianEliminationSolve(matrix, m, n);

                        document.getElementById('sysSolution').textContent = result.solution;
                        document.getElementById('sysSolutionType').textContent = result.type;
                        document.getElementById('sysRank').textContent = result.rank;
                        document.getElementById('sysResults').style.display = 'block';

                        calculatorApp.notificationManager.showSuccess('Система решена');
                    } catch (e) {
                        display.showError(e.message);
                    }
                };

                function gaussianEliminationSolve(matrix, m, n) {
                    const mat = matrix.clone();
                    let pivotRow = 0;
                    const pivotCols = [];

                    for (let col = 0; col < n && pivotRow < m; col++) {
                        let maxRow = pivotRow;
                        for (let row = pivotRow + 1; row < m; row++) {
                            if (Math.abs(mat.data[row][col]) > Math.abs(mat.data[maxRow][col])) {
                                maxRow = row;
                            }
                        }

                        if (Math.abs(mat.data[maxRow][col]) < 1e-10) continue;

                        [mat.data[pivotRow], mat.data[maxRow]] = [mat.data[maxRow], mat.data[pivotRow]];

                        const pivot = mat.data[pivotRow][col];
                        for (let j = 0; j <= n; j++) {
                            mat.data[pivotRow][j] /= pivot;
                        }

                        for (let row = pivotRow + 1; row < m; row++) {
                            const factor = mat.data[row][col];
                            for (let j = 0; j <= n; j++) {
                                mat.data[row][j] -= factor * mat.data[pivotRow][j];
                            }
                        }

                        pivotCols.push({ row: pivotRow, col: col });
                        pivotRow++;
                    }

                    for (let i = pivotCols.length - 1; i >= 0; i--) {
                        const { row, col } = pivotCols[i];
                        for (let upperRow = 0; upperRow < row; upperRow++) {
                            const factor = mat.data[upperRow][col];
                            for (let j = 0; j <= n; j++) {
                                mat.data[upperRow][j] -= factor * mat.data[row][j];
                            }
                        }
                    }

                    const rank = pivotCols.length;

                    for (let row = 0; row < m; row++) {
                        let allZeros = true;
                        for (let col = 0; col < n; col++) {
                            if (Math.abs(mat.data[row][col]) > 1e-10) {
                                allZeros = false;
                                break;
                            }
                        }
                        if (allZeros && Math.abs(mat.data[row][n]) > 1e-10) {
                            return {
                                solution: 'Нет решений',
                                type: 'Несовместная система',
                                rank: rank
                            };
                        }
                    }

                    if (rank === n) {
                        const solution = [];
                        for (let col = 0; col < n; col++) {
                            const pivotInfo = pivotCols.find(p => p.col === col);
                            if (pivotInfo) {
                                solution.push(`x${col + 1} = ${mat.data[pivotInfo.row][n].toFixed(6)}`);
                            }
                        }
                        return {
                            solution: solution.join(', '),
                            type: 'Единственное решение',
                            rank: rank
                        };
                    }

                    const freeVars = [];
                    for (let col = 0; col < n; col++) {
                        if (!pivotCols.some(p => p.col === col)) {
                            freeVars.push(`x${col + 1}`);
                        }
                    }

                    return {
                        solution: `Свободные переменные: ${freeVars.join(', ')}`,
                        type: 'Бесконечно много решений',
                        rank: rank
                    };
                }

                window.showGaussSteps = () => {
                    const stepsDiv = document.getElementById('gaussSteps');
                    if (stepsDiv) {
                        stepsDiv.style.display = stepsDiv.style.display === 'none' ? 'block' : 'none';
                    }
                    const container = document.getElementById('stepsContainer');
                    if (container) {
                        container.innerHTML = '<p style="color: var(--text-secondary);">Нажмите "Решить систему" для просмотра шагов</p>';
                    }
                };

                // Initialize matrices when entering matrix mode
                const originalSetMode = window.setMode;
                window.setMode = (mode) => {
                    originalSetMode(mode);
                    if (mode === 'matrix') {
                        setTimeout(initializeMatrices, 100);
                    }
                };

                console.log('Calculator application initialized successfully');
            } catch (error) {
                console.error('Failed to initialize calculator application:', error);
                document.body.innerHTML = `
                    <div style="color: red; text-align: center; padding: 20px;">
                        <h2>Calculator Loading Error</h2>
                        <p>An error occurred while initializing the application.</p>
                        <p>Check the developer console for details.</p>
                    </div>
                `;
            }
        });
    </script>
