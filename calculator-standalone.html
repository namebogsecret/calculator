<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продвинутый графический калькулятор</title>
    <style>
/* CSS Variables */
:root {
    --primary: #4F46E5;
    --primary-light: #6366F1;
    --primary-dark: #4338CA;
    --primary-glow: rgba(79, 70, 229, 0.5);
    --secondary: #06B6D4;
    --secondary-light: #22D3EE;
    --secondary-dark: #0891B2;
    --secondary-glow: rgba(6, 182, 212, 0.5);
    --accent: #EC4899;
    --accent-light: #F472B6;
    --accent-glow: rgba(236, 72, 153, 0.5);
    --success: #10B981;
    --success-light: #34D399;
    --success-glow: rgba(16, 185, 129, 0.5);
    --danger: #EF4444;
    --danger-dark: #DC2626;
    --warning: #F59E0B;
    --warning-dark: #D97706;
    --dark: #0F0F1E;
    --dark-lighter: #1A1A2E;
    --dark-light: #252541;
    --dark-card: rgba(26, 26, 46, 0.95);
    --text: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --border: rgba(148, 163, 184, 0.1);
    --border-light: rgba(148, 163, 184, 0.05);
    --glass-bg: rgba(26, 26, 46, 0.85);
    --glass-border: rgba(255, 255, 255, 0.1);
}

/* Basic Reset */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 15px;
    color: var(--text);
    position: relative;
    overflow-x: hidden;
    overflow-y: auto;
}

body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
        radial-gradient(circle at 20% 80%, rgba(79, 70, 229, 0.25) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(6, 182, 212, 0.25) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.15) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
}

/* Calculator Container */
.calculator-container {
    background: var(--glass-bg);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);
    border: 2px solid var(--glass-border);
    border-radius: 28px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), 0 10px 25px rgba(0, 0, 0, 0.4);
    overflow: hidden;
    width: 100%;
    max-width: 820px;
    position: relative;
    z-index: 1;
    animation: slideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Mode Selector */
.mode-selector {
    display: flex;
    background: linear-gradient(135deg, rgba(15, 15, 30, 0.95) 0%, rgba(20, 20, 35, 0.95) 100%);
    padding: 14px;
    gap: 10px;
    border-bottom: 2px solid var(--border);
    flex-wrap: wrap;
}

.mode-btn {
    flex: 1;
    min-width: 110px;
    padding: 12px 18px;
    background: transparent;
    color: var(--text-secondary);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.mode-btn:hover {
    color: var(--text);
    border-color: var(--glass-border);
    transform: translateY(-2px);
}

.mode-btn.active {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border-color: var(--primary-light);
    box-shadow: 0 6px 20px var(--primary-glow);
    transform: translateY(-2px);
}

/* Display */
.display {
    background: linear-gradient(135deg, #0A0A14 0%, #12121E 100%);
    color: var(--text);
    padding: 28px;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
    position: relative;
    border-bottom: 2px solid var(--border);
}

.display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--primary) 20%, var(--secondary) 50%, var(--accent) 80%, transparent 100%);
    animation: scan 4s linear infinite;
}

.expression {
    font-size: 17px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    min-height: 26px;
    letter-spacing: 1px;
}

.result {
    font-size: 40px;
    font-weight: 300;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--text) 0%, var(--primary-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

/* Buttons Container */
.buttons-container {
    background: linear-gradient(135deg, var(--dark-lighter) 0%, rgba(26, 26, 46, 0.98) 100%);
    padding: 12px;
    border-top: 1px solid var(--border);
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

.btn {
    aspect-ratio: 1.5;
    min-height: 58px;
    font-size: 18px;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    color: white;
    position: relative;
    overflow: hidden;
    background: var(--dark-light);
    border: 1.5px solid var(--border);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
}

.btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
}

.btn:active {
    transform: translateY(0) scale(0.97);
}

.btn-number { background: linear-gradient(135deg, var(--dark-light) 0%, #2D2D4A 100%); }
.btn-operator {
    background: linear-gradient(135deg, var(--warning) 0%, var(--warning-dark) 100%);
    box-shadow: 0 4px 6px rgba(245, 158, 11, 0.4);
}
.btn-function {
    background: linear-gradient(135deg, var(--dark-light) 0%, #323256 100%);
    font-size: 15px;
}
.btn-clear {
    background: linear-gradient(135deg, var(--danger) 0%, var(--danger-dark) 100%);
    box-shadow: 0 4px 6px rgba(239, 68, 68, 0.4);
}
.btn-equals {
    background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
    box-shadow: 0 4px 6px var(--success-glow);
}

/* Scientific Buttons */
.scientific-btns {
    display: none;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 8px;
}

.scientific-mode .scientific-btns { display: grid; }

/* Graph Container */
.graph-container {
    display: none;
    background: var(--dark-lighter);
    padding: 20px;
    border-bottom: 1px solid var(--border);
}

#graph-canvas {
    background: radial-gradient(ellipse at center, #0a0a0a 0%, #000 100%);
    border: 1px solid var(--border);
    cursor: crosshair;
    width: 100%;
    height: 350px;
    display: block;
    border-radius: 8px;
}

.graph-controls {
    display: flex;
    gap: 10px;
    margin-top: 15px;
    flex-wrap: wrap;
    align-items: center;
}

.graph-input {
    flex: 1;
    min-width: 200px;
    padding: 10px 15px;
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-family: 'SF Mono', monospace;
    font-size: 14px;
}

.graph-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
}

.graph-btn {
    padding: 10px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.3s;
}

.graph-btn:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
}

.zoom-controls { display: flex; gap: 5px; }
.zoom-btn {
    width: 36px;
    height: 36px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark-light);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 20px;
    font-weight: bold;
}

/* Tab Styles */
.graph-tabs {
    display: flex;
    gap: 12px;
    margin-bottom: 18px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 2px;
}

.tab-btn {
    padding: 10px 18px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.3s;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
}

.tab-btn:hover { color: var(--text); background: rgba(79, 70, 229, 0.1); }
.tab-btn.active {
    color: var(--primary-light);
    border-bottom-color: var(--primary);
    background: rgba(79, 70, 229, 0.15);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

/* Statistics Container */
.statistics-container {
    display: none;
    background: var(--dark-lighter);
    padding: 20px;
    border-bottom: 1px solid var(--border);
}

.stats-input {
    width: 100%;
    min-height: 100px;
    padding: 12px;
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-family: 'SF Mono', monospace;
    resize: vertical;
    margin-bottom: 15px;
}

.stats-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.stats-results {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 15px;
    display: none;
}

.stat-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
}
.stat-item:last-child { border-bottom: none; }
.stat-label { color: var(--text-secondary); }
.stat-value {
    font-family: 'SF Mono', monospace;
    color: var(--primary);
    font-weight: 500;
}

/* Table */
.table-container { max-height: 300px; overflow-y: auto; margin-top: 15px; }
.value-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
}
.value-table th, .value-table td {
    padding: 8px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
}
.value-table th { background: var(--dark-light); color: var(--text); font-weight: 600; }
.value-table tr:hover { background: rgba(59, 130, 246, 0.1); }

.regression-select {
    padding: 8px 12px;
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
}

/* Data Lists */
.data-lists {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 10px;
    margin-bottom: 15px;
}
.data-list {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
}
.list-header { font-weight: bold; color: var(--primary); margin-bottom: 5px; text-align: center; }
.list-values { max-height: 150px; overflow-y: auto; font-family: 'SF Mono', monospace; font-size: 14px; }
.list-value { padding: 2px 0; text-align: center; }

/* Animations */
@keyframes scan {
    0% { transform: translateX(-100%); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(100%); opacity: 0; }
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Responsive */
@media (min-width: 600px) {
    .buttons { grid-template-columns: repeat(5, 1fr); }
    .scientific-btns { grid-template-columns: repeat(5, 1fr); }
}

@media (max-width: 599px) {
    .calculator-container { border-radius: 0; min-height: 100vh; max-width: 100%; display: flex; flex-direction: column; }
    .mode-btn { min-width: 80px; font-size: 12px; padding: 8px 12px; }
    .buttons-container { flex: 1; display: flex; flex-direction: column; }
    .buttons { flex: 1; }
    .display { padding: 20px; min-height: 100px; }
    .result { font-size: 28px; }
    .btn { min-height: 0; font-size: 16px; }
    .btn-function { font-size: 13px; }
    #graph-canvas { height: 250px; }
}
    </style>
</head>
<body>
    <div class="calculator-container" id="calculator">
        <!-- Mode Selector -->
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('basic')">Основной</button>
            <button class="mode-btn" onclick="setMode('scientific')">Научный</button>
            <button class="mode-btn" onclick="setMode('graph')">Графики</button>
            <button class="mode-btn" onclick="setMode('statistics')">Статистика</button>
        </div>

        <!-- Display Area -->
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>

        <!-- Graph Container -->
        <div class="graph-container" id="graphContainer">
            <div class="graph-tabs">
                <button class="tab-btn active" onclick="switchGraphTab('function')">Функции</button>
                <button class="tab-btn" onclick="switchGraphTab('table')">Таблица</button>
            </div>
            <div class="tab-content active" id="function-tab">
                <canvas id="graph-canvas"></canvas>
                <div class="graph-controls">
                    <input type="text" class="graph-input" id="functionInput" placeholder="y = sin(x), x^2, 2*x+1">
                    <button class="graph-btn" onclick="plotGraph()">Построить</button>
                    <button class="graph-btn" onclick="clearGraph()">Очистить</button>
                    <div class="zoom-controls">
                        <button class="graph-btn zoom-btn" onclick="zoomIn()">+</button>
                        <button class="graph-btn zoom-btn" onclick="zoomOut()">-</button>
                        <button class="graph-btn zoom-btn" onclick="resetZoom()">R</button>
                    </div>
                </div>
            </div>
            <div class="tab-content" id="table-tab">
                <div class="graph-controls">
                    <input type="text" class="graph-input" id="tableFunction" placeholder="f(x) = x^2">
                    <input type="number" class="graph-input" id="tableStart" placeholder="От" value="-5" style="max-width: 100px;">
                    <input type="number" class="graph-input" id="tableEnd" placeholder="До" value="5" style="max-width: 100px;">
                    <input type="number" class="graph-input" id="tableStep" placeholder="Шаг" value="0.5" style="max-width: 100px;">
                    <button class="graph-btn" onclick="generateTable()">Создать</button>
                </div>
                <div class="table-container">
                    <table class="value-table" id="valueTable">
                        <thead><tr><th>x</th><th>f(x)</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Statistics Container -->
        <div class="statistics-container" id="statisticsContainer">
            <div class="graph-tabs">
                <button class="tab-btn active" onclick="switchStatsTab('onevar')">1-Var Stats</button>
            </div>
            <div class="tab-content active" id="onevar-tab">
                <textarea class="stats-input" id="statsInput" placeholder="Введите числа через запятую, пробел или с новой строки&#10;Например: 1, 2, 3, 4, 5"></textarea>
                <div class="stats-controls">
                    <button class="graph-btn" onclick="calculateStatistics()">Рассчитать</button>
                </div>
                <div class="stats-results" id="statsResults">
                    <div class="stat-item"><span class="stat-label">n (Количество):</span><span class="stat-value" id="statCount">-</span></div>
                    <div class="stat-item"><span class="stat-label">x̄ (Среднее):</span><span class="stat-value" id="statMean">-</span></div>
                    <div class="stat-item"><span class="stat-label">Σx:</span><span class="stat-value" id="statSum">-</span></div>
                    <div class="stat-item"><span class="stat-label">s (Станд. откл.):</span><span class="stat-value" id="statStdDev">-</span></div>
                    <div class="stat-item"><span class="stat-label">Минимум:</span><span class="stat-value" id="statMin">-</span></div>
                    <div class="stat-item"><span class="stat-label">Медиана:</span><span class="stat-value" id="statMedian">-</span></div>
                    <div class="stat-item"><span class="stat-label">Максимум:</span><span class="stat-value" id="statMax">-</span></div>
                </div>
            </div>
        </div>

        <!-- Calculator Buttons -->
        <div class="buttons-container">
            <div class="scientific-btns" id="scientificBtns">
                <button class="btn btn-function" onclick="appendFunction('sin(')">sin</button>
                <button class="btn btn-function" onclick="appendFunction('cos(')">cos</button>
                <button class="btn btn-function" onclick="appendFunction('tan(')">tan</button>
                <button class="btn btn-function" onclick="appendFunction('log(')">log</button>
                <button class="btn btn-function" onclick="appendFunction('ln(')">ln</button>
                <button class="btn btn-function" onclick="appendFunction('sqrt(')">√</button>
                <button class="btn btn-function" onclick="appendFunction('^')">x^y</button>
                <button class="btn btn-function" onclick="appendFunction('abs(')">|x|</button>
                <button class="btn btn-function" onclick="appendToDisplay('3.14159')">π</button>
                <button class="btn btn-function" onclick="appendToDisplay('2.71828')">e</button>
                <button class="btn btn-function" onclick="appendFunction('asin(')">asin</button>
                <button class="btn btn-function" onclick="appendFunction('acos(')">acos</button>
                <button class="btn btn-function" onclick="appendFunction('atan(')">atan</button>
                <button class="btn btn-function" onclick="toggleAngleMode()" id="angleMode">DEG</button>
                <button class="btn btn-function" onclick="appendFunction('1/')">1/x</button>
                <button class="btn btn-function" onclick="appendFunction('(')">（</button>
                <button class="btn btn-function" onclick="appendFunction(')')">）</button>
                <button class="btn btn-function" onclick="appendFunction('!')">x!</button>
                <button class="btn btn-function" onclick="appendFunction('cbrt(')">∛</button>
                <button class="btn btn-function" onclick="appendFunction('%')">mod</button>
            </div>

            <div class="buttons">
                <button class="btn btn-clear" onclick="clearDisplay()">C</button>
                <button class="btn btn-function" onclick="deleteLastChar()">⌫</button>
                <button class="btn btn-function" onclick="appendToDisplay('/')">/</button>
                <button class="btn btn-operator" onclick="appendToDisplay('*')">×</button>

                <button class="btn btn-number" onclick="appendToDisplay('7')">7</button>
                <button class="btn btn-number" onclick="appendToDisplay('8')">8</button>
                <button class="btn btn-number" onclick="appendToDisplay('9')">9</button>
                <button class="btn btn-operator" onclick="appendToDisplay('-')">−</button>

                <button class="btn btn-number" onclick="appendToDisplay('4')">4</button>
                <button class="btn btn-number" onclick="appendToDisplay('5')">5</button>
                <button class="btn btn-number" onclick="appendToDisplay('6')">6</button>
                <button class="btn btn-operator" onclick="appendToDisplay('+')">+</button>

                <button class="btn btn-number" onclick="appendToDisplay('1')">1</button>
                <button class="btn btn-number" onclick="appendToDisplay('2')">2</button>
                <button class="btn btn-number" onclick="appendToDisplay('3')">3</button>
                <button class="btn btn-equals" onclick="calculate()">=</button>

                <button class="btn btn-number" onclick="appendToDisplay('0')">0</button>
                <button class="btn btn-number" onclick="appendToDisplay('.')">.</button>
                <button class="btn btn-function" onclick="appendToDisplay('(')">(</button>
                <button class="btn btn-function" onclick="appendToDisplay(')')">)</button>
            </div>
        </div>
    </div>

    <script>
    // Calculator State
    let expression = '';
    let angleMode = 'deg';
    let currentMode = 'basic';
    let graphFunctions = [];
    let graphScale = 40;

    // DOM Elements
    const expressionEl = document.getElementById('expression');
    const resultEl = document.getElementById('result');
    const calculatorEl = document.getElementById('calculator');
    const graphContainer = document.getElementById('graphContainer');
    const statsContainer = document.getElementById('statisticsContainer');

    // Utility: Factorial
    function factorial(n) {
        if (n < 0) return NaN;
        if (n === 0) return 1;
        let result = 1;
        for (let i = 2; i <= n; i++) result *= i;
        return result;
    }

    // Utility: Format number
    function formatNumber(num) {
        if (typeof num !== 'number' || isNaN(num) || !isFinite(num)) return 'Error';
        if (Math.abs(num) < 0.000001 || Math.abs(num) > 999999) return num.toExponential(6);
        return parseFloat(num.toPrecision(10)).toString();
    }

    // Prepare expression for eval
    function prepareExpression(expr) {
        let prepared = expr
            .replace(/sin/g, 'Math.sin')
            .replace(/cos/g, 'Math.cos')
            .replace(/tan/g, 'Math.tan')
            .replace(/aMath\.sin/g, 'Math.asin')
            .replace(/aMath\.cos/g, 'Math.acos')
            .replace(/aMath\.tan/g, 'Math.atan')
            .replace(/log/g, 'Math.log10')
            .replace(/ln/g, 'Math.log')
            .replace(/sqrt/g, 'Math.sqrt')
            .replace(/cbrt/g, 'Math.cbrt')
            .replace(/abs/g, 'Math.abs')
            .replace(/exp/g, 'Math.exp')
            .replace(/floor/g, 'Math.floor')
            .replace(/ceil/g, 'Math.ceil')
            .replace(/round/g, 'Math.round')
            .replace(/\^/g, '**')
            .replace(/÷/g, '/')
            .replace(/×/g, '*')
            .replace(/−/g, '-')
            .replace(/pi/g, 'Math.PI');

        // Handle factorial
        prepared = prepared.replace(/(\d+)!/g, (match, num) => factorial(parseInt(num)));

        // Convert angles for trig functions
        if (angleMode === 'deg') {
            prepared = prepared
                .replace(/Math\.sin\((.*?)\)/g, (m, angle) => `Math.sin((${angle}) * Math.PI / 180)`)
                .replace(/Math\.cos\((.*?)\)/g, (m, angle) => `Math.cos((${angle}) * Math.PI / 180)`)
                .replace(/Math\.tan\((.*?)\)/g, (m, angle) => `Math.tan((${angle}) * Math.PI / 180)`);
        }
        return prepared;
    }

    // Calculator Functions
    function appendToDisplay(value) {
        if (expression === '0' && value !== '.') expression = '';
        expression += value;
        expressionEl.textContent = expression || '0';
        previewCalculation();
    }

    function appendFunction(func) {
        expression += func;
        expressionEl.textContent = expression || '0';
        previewCalculation();
    }

    function clearDisplay() {
        expression = '';
        expressionEl.textContent = '';
        resultEl.textContent = '0';
    }

    function deleteLastChar() {
        expression = expression.slice(0, -1);
        expressionEl.textContent = expression || '0';
        previewCalculation();
    }

    function calculate() {
        try {
            const prepared = prepareExpression(expression);
            const result = eval(prepared);
            if (!isFinite(result) || isNaN(result)) throw new Error('Invalid');
            resultEl.textContent = formatNumber(result);
            expression = result.toString();
        } catch (e) {
            resultEl.textContent = 'Error';
        }
    }

    function previewCalculation() {
        try {
            const prepared = prepareExpression(expression);
            const result = eval(prepared);
            if (isFinite(result) && !isNaN(result)) {
                resultEl.textContent = formatNumber(result);
            }
        } catch (e) { /* ignore preview errors */ }
    }

    function toggleAngleMode() {
        angleMode = angleMode === 'deg' ? 'rad' : 'deg';
        document.getElementById('angleMode').textContent = angleMode.toUpperCase();
        previewCalculation();
    }

    // Mode Management
    function setMode(mode) {
        currentMode = mode;

        // Update buttons
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Update container classes
        calculatorEl.classList.remove('scientific-mode');
        graphContainer.style.display = 'none';
        statsContainer.style.display = 'none';

        switch (mode) {
            case 'scientific':
                calculatorEl.classList.add('scientific-mode');
                break;
            case 'graph':
                graphContainer.style.display = 'block';
                initGraph();
                break;
            case 'statistics':
                statsContainer.style.display = 'block';
                break;
        }
    }

    // Graph Functions
    let canvas, ctx;

    function initGraph() {
        canvas = document.getElementById('graph-canvas');
        ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        drawGraph();
    }

    function drawGraph() {
        if (!ctx) return;
        const w = canvas.width, h = canvas.height;
        const centerX = w / 2, centerY = h / 2;

        // Clear
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, w, h);

        // Grid
        ctx.strokeStyle = 'rgba(100, 100, 100, 0.3)';
        ctx.lineWidth = 0.5;
        for (let i = -20; i <= 20; i++) {
            const x = centerX + i * graphScale;
            const y = centerY + i * graphScale;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        }

        // Axes
        ctx.strokeStyle = 'rgba(200, 200, 200, 0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(w, centerY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, h); ctx.stroke();

        // Draw functions
        const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
        graphFunctions.forEach((func, idx) => {
            ctx.strokeStyle = colors[idx % colors.length];
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            let started = false;
            for (let px = 0; px < w; px++) {
                const x = (px - centerX) / graphScale;
                try {
                    const y = func(x);
                    if (isFinite(y) && !isNaN(y)) {
                        const py = centerY - y * graphScale;
                        if (!started) { ctx.moveTo(px, py); started = true; }
                        else ctx.lineTo(px, py);
                    } else { started = false; }
                } catch (e) { started = false; }
            }
            ctx.stroke();
        });
    }

    function plotGraph() {
        const input = document.getElementById('functionInput').value;
        if (!input) return;
        try {
            let funcStr = input.replace(/y\s*=\s*/, '').replace(/f\(x\)\s*=\s*/, '');
            funcStr = funcStr
                .replace(/sin/g, 'Math.sin')
                .replace(/cos/g, 'Math.cos')
                .replace(/tan/g, 'Math.tan')
                .replace(/log/g, 'Math.log10')
                .replace(/ln/g, 'Math.log')
                .replace(/sqrt/g, 'Math.sqrt')
                .replace(/abs/g, 'Math.abs')
                .replace(/\^/g, '**')
                .replace(/pi/g, 'Math.PI')
                .replace(/e(?![x])/g, 'Math.E');
            const func = new Function('x', `return ${funcStr}`);
            func(0); // Test
            graphFunctions.push(func);
            drawGraph();
        } catch (e) {
            alert('Ошибка в функции: ' + e.message);
        }
    }

    function clearGraph() {
        graphFunctions = [];
        drawGraph();
    }

    function zoomIn() { graphScale *= 1.2; drawGraph(); }
    function zoomOut() { graphScale /= 1.2; drawGraph(); }
    function resetZoom() { graphScale = 40; drawGraph(); }

    function switchGraphTab(tab) {
        document.querySelectorAll('#graphContainer .tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('#graphContainer .tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(tab + '-tab').classList.add('active');
    }

    function generateTable() {
        const funcInput = document.getElementById('tableFunction').value;
        const start = parseFloat(document.getElementById('tableStart').value);
        const end = parseFloat(document.getElementById('tableEnd').value);
        const step = parseFloat(document.getElementById('tableStep').value);

        if (!funcInput || isNaN(start) || isNaN(end) || isNaN(step) || step <= 0) {
            alert('Заполните все поля корректно');
            return;
        }

        let funcStr = funcInput.replace(/f\(x\)\s*=\s*/, '').replace(/y\s*=\s*/, '');
        funcStr = funcStr
            .replace(/sin/g, 'Math.sin')
            .replace(/cos/g, 'Math.cos')
            .replace(/tan/g, 'Math.tan')
            .replace(/log/g, 'Math.log10')
            .replace(/ln/g, 'Math.log')
            .replace(/sqrt/g, 'Math.sqrt')
            .replace(/\^/g, '**')
            .replace(/pi/g, 'Math.PI');

        try {
            const func = new Function('x', `return ${funcStr}`);
            const tbody = document.querySelector('#valueTable tbody');
            tbody.innerHTML = '';

            for (let x = start; x <= end; x += step) {
                const y = func(x);
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${x.toFixed(4)}</td><td>${isFinite(y) ? y.toFixed(6) : 'undefined'}</td>`;
                tbody.appendChild(tr);
            }
        } catch (e) {
            alert('Ошибка в функции: ' + e.message);
        }
    }

    // Statistics Functions
    function switchStatsTab(tab) {
        document.querySelectorAll('#statisticsContainer .tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('#statisticsContainer .tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(tab + '-tab').classList.add('active');
    }

    function calculateStatistics() {
        const input = document.getElementById('statsInput').value;
        const numbers = input.split(/[\s,;]+/).map(n => parseFloat(n)).filter(n => !isNaN(n));

        if (numbers.length === 0) {
            alert('Введите числа');
            return;
        }

        numbers.sort((a, b) => a - b);
        const n = numbers.length;
        const sum = numbers.reduce((a, b) => a + b, 0);
        const mean = sum / n;
        const variance = numbers.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0) / (n - 1);
        const stdDev = Math.sqrt(variance);
        const median = n % 2 === 0 ? (numbers[n/2 - 1] + numbers[n/2]) / 2 : numbers[Math.floor(n/2)];

        document.getElementById('statCount').textContent = n;
        document.getElementById('statMean').textContent = mean.toFixed(6);
        document.getElementById('statSum').textContent = sum.toFixed(6);
        document.getElementById('statStdDev').textContent = stdDev.toFixed(6);
        document.getElementById('statMin').textContent = numbers[0].toFixed(6);
        document.getElementById('statMedian').textContent = median.toFixed(6);
        document.getElementById('statMax').textContent = numbers[n-1].toFixed(6);

        document.getElementById('statsResults').style.display = 'block';
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
        if (currentMode !== 'basic' && currentMode !== 'scientific') return;

        if (/^\d$/.test(e.key)) appendToDisplay(e.key);
        else if (['+', '-', '*', '/'].includes(e.key)) appendToDisplay(e.key);
        else if (e.key === '.') appendToDisplay('.');
        else if (e.key === 'Enter') calculate();
        else if (e.key === 'Escape') clearDisplay();
        else if (e.key === 'Backspace') deleteLastChar();
        else if (e.key === '(' || e.key === ')') appendToDisplay(e.key);
    });

    console.log('Calculator initialized successfully');
    </script>
</body>
